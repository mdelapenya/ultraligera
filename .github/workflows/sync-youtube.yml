name: Sync YouTube stats

on:
  schedule:
    # Nightly at 03:30 UTC — 30 min after the tour sync so they don't race
    # on the same branch.
    - cron: "30 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-youtube
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: VERCEL
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Refresh data/videos.json from YouTube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: npm run sync:youtube

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore(media): refresh YouTube stats"
          file_pattern: |
            data/videos.json
            data/videos-history.json
          commit_user_name: ultraligera-bot
          commit_user_email: bot@users.noreply.github.com
