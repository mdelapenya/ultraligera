name: Sync discography

on:
  schedule:
    # Nightly at 04:00 UTC — after tour (03:00) and YouTube (03:30) sync.
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-discography
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Refresh data/discography.json from iTunes
        run: npm run sync:disco

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore(music): sync discography from iTunes"
          file_pattern: data/discography.json
          commit_user_name: ultraligera-bot
          commit_user_email: bot@users.noreply.github.com
